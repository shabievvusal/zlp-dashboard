<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сообщить о нарушении</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #21A038;
      --green-dark: #178030;
      --green-light: #E8F5EC;
      --bg: #F5F7FA;
      --border: #DDE2EA;
      --text: #1D1D1B;
      --text-muted: #6B7280;
      --radius: 10px;
      --radius-sm: 6px;
      --font: 'Inter', 'Segoe UI', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 16px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 32px 24px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .logo-icon {
      width: 40px; height: 40px;
      background: var(--green);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: #fff; font-weight: 700;
    }
    .logo-text { font-size: 15px; font-weight: 700; }
    .logo-sub { font-size: 11px; color: var(--text-muted); }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block; font-size: 13px; font-weight: 500;
      color: var(--text-muted); margin-bottom: 6px;
    }
    .form-control {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 15px; font-family: var(--font);
      color: var(--text); background: #fff;
      transition: border-color .2s; outline: none;
    }
    .form-control:focus { border-color: var(--green); box-shadow: 0 0 0 3px var(--green-light); }
    .form-control[type="file"] { padding: 9px 14px; font-size: 13px; }
    .required::after { content: ' *'; color: #DC2626; }
    .btn-submit {
      width: 100%; padding: 13px;
      background: var(--green); color: #fff;
      border: none; border-radius: var(--radius-sm);
      font-size: 16px; font-weight: 600;
      font-family: var(--font);
      cursor: pointer; transition: background .15s;
      margin-top: 8px;
    }
    .btn-submit:hover { background: var(--green-dark); }
    .btn-submit:disabled { opacity: .55; cursor: not-allowed; }
    .msg {
      margin-top: 16px; padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 500;
      display: none;
    }
    .msg--ok { background: var(--green-light); color: var(--green-dark); display: block; }
    .msg--err { background: #FEF2F2; color: #DC2626; display: block; }
    @media (max-width: 640px) {
      body {
        padding: 12px;
      }
      .card {
        max-width: 100%;
        border-radius: 14px;
        padding: 20px 14px;
      }
      .logo {
        margin-bottom: 14px;
      }
      h1 {
        font-size: 18px;
      }
      .subtitle {
        font-size: 12px;
        margin-bottom: 16px;
      }
      .form-group {
        margin-bottom: 12px;
      }
      .form-control {
        min-height: 44px;
        font-size: 16px; /* avoids iOS auto-zoom on input focus */
      }
      .btn-submit {
        min-height: 46px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">СЛ</div>
      <div>
        <div class="logo-text">СберЛогистика</div>
        <div class="logo-sub">Консолидация</div>
      </div>
    </div>
    <h1>Сообщить о нарушении</h1>
    <p class="subtitle">Заполните форму и прикрепите фото</p>

    <form id="form" enctype="multipart/form-data">
      <div class="form-group">
        <label for="cell" class="required">Место хранения (ячейка)</label>
        <input class="form-control" type="text" id="cell" name="cell" placeholder="А-01-02-03" required autocomplete="off">
      </div>
      <div class="form-group">
        <label for="barcode" class="required">Штрихкод товара или ЕО</label>
        <input class="form-control" type="text" id="barcode" name="barcode" inputmode="numeric" placeholder="ШК товара или ЕО" required autocomplete="off">
      </div>
      <div class="form-group">
        <label for="employeeName">Ваше имя (необязательно)</label>
        <input class="form-control" type="text" id="employeeName" name="employeeName" placeholder="Петров" autocomplete="name">
      </div>
      <div class="form-group">
        <label for="photo">Фото нарушения (можно несколько)</label>
        <input class="form-control" type="file" id="photo" name="photo" accept="image/*" multiple>
      </div>
      <button type="submit" class="btn-submit" id="btn-submit">Отправить</button>
    </form>
    <div id="msg" class="msg"></div>
  </div>

  <script>
    var form = document.getElementById('form');
    var msgEl = document.getElementById('msg');
    var btnSubmit = document.getElementById('btn-submit');

    // Порядок полей для перехода по Enter (сканер вводит значение + Enter — переходим в следующее поле, не отправляем форму)
    var focusOrder = [
      document.getElementById('cell'),
      document.getElementById('barcode'),
      document.getElementById('employeeName'),
      document.getElementById('photo')
    ].filter(Boolean);

    form.addEventListener('keydown', function(e) {
      if (e.key !== 'Enter') return;
      var el = document.activeElement;
      var idx = focusOrder.indexOf(el);
      if (idx === -1) return;
      e.preventDefault();
      var next = focusOrder[idx + 1] || focusOrder[0];
      next.focus();
    });

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      msgEl.className = 'msg';
      msgEl.style.display = 'none';
      btnSubmit.disabled = true;
      btnSubmit.textContent = 'Отправка...';

      var fd = new FormData(form);
      fetch('/api/consolidation/complaints', { method: 'POST', body: fd })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.ok) {
            msgEl.textContent = 'Жалоба отправлена! Спасибо.';
            msgEl.className = 'msg msg--ok';
            form.reset();
          } else {
            msgEl.textContent = 'Ошибка: ' + (data.error || 'Попробуйте снова');
            msgEl.className = 'msg msg--err';
          }
        })
        .catch(function(err) {
          msgEl.textContent = 'Ошибка сети: ' + err.message;
          msgEl.className = 'msg msg--err';
        })
        .finally(function() {
          btnSubmit.disabled = false;
          btnSubmit.textContent = 'Отправить';
        });
    });
  </script>
</body>
</html>
