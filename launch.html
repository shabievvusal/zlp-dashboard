<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OWMS — Запуск</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #e4e4e7;
      padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 2rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    h1 { font-size: 1.5rem; margin: 0 0 0.5rem; font-weight: 600; }
    .sub { color: #a1a1aa; font-size: 0.9rem; margin-bottom: 1.5rem; }
    .btn-launch {
      display: inline-block;
      background: #3b82f6;
      color: #fff;
      border: none;
      padding: 1rem 2rem;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
      margin-bottom: 1rem;
    }
    .btn-launch:hover { background: #2563eb; }
    .steps {
      text-align: left;
      background: rgba(0,0,0,0.2);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      font-size: 0.9rem;
      color: #d4d4d8;
      margin-top: 1rem;
    }
    .steps strong { color: #fff; }
    .steps code { background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; }
    .port-note { margin-top: 1rem; font-size: 0.85rem; color: #a1a1aa; }
  </style>
</head>
<body>
  <div class="card">
    <h1>OWMS Samokat Collector</h1>
    <p class="sub">Запуск на отдельном порту</p>
    <a href="#" id="btn-open" class="btn-launch">Открыть приложение</a>
    <div class="steps">
      <strong>Первый запуск на сервере Ubuntu:</strong><br>
      1. <code>chmod +x start.sh</code><br>
      2. <code>./start.sh</code><br>
      Скрипт проверит Node.js, установит зависимости и запустит сервер.
    </div>
    <p class="port-note" id="port-note">Порт по умолчанию: 3001</p>
  </div>
  <script>
    (function () {
      var port = 3003;
      var btn = document.getElementById('btn-open');
      var portNote = document.getElementById('port-note');
      function appUrl() {
        var host = window.location.hostname;
        if (!host || host === 'localhost' || host === '' || window.location.protocol === 'file:') {
          host = 'localhost';
        }
        return (window.location.protocol === 'https:' ? 'https:' : 'http:') + '//' + host + ':' + port;
      }
      var url = appUrl();
      btn.href = url;
      btn.addEventListener('click', function (e) {
        e.preventDefault();
        window.open(url, '_blank', 'noopener');
      });
      portNote.textContent = 'Приложение: ' + url;
    })();
  </script>
</body>
</html>
